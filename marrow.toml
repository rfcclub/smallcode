# MarrowScript project configuration
# Used by `marrowc compile` to find the system declaration

[project]
name = "smallcode"
version = "0.1.0"
entry = "core.marrow"
target = "express"

[build]
output_dir = "output"
no_sdk = true
no_openapi = true

[cognition]
# Models are local — no external API keys needed by default
default_provider = "ollama"
traces_backend = "memory"
