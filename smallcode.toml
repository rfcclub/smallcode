# SmallCode default configuration

[model]
provider = "ollama"
name = "qwen2.5-coder-14b"
# context_length = 32768
# tool_format = "hermes"

[context]
max_budget_pct = 70
working_memory_tokens = 500
summary_threshold = 200

[tools]
enabled = ["read_file", "write_file", "patch", "bash", "search", "find_files", "symbols", "memory", "plan"]
bash_timeout = 30

[planner]
auto_plan = true
max_retries = 2
validate_after_edit = true

[hooks]
# pre_edit = "lint"
# post_edit = "typecheck"

[tui]
theme = "dark"
show_token_usage = true
auto_approve = false

[escalation]
# Escalate to a stronger model when local model hard fails after decompose
# Set provider + api_key, OR set env vars: ANTHROPIC_API_KEY, OPENAI_API_KEY, DEEPSEEK_API_KEY
# provider = "anthropic"   # anthropic, openai, deepseek
# api_key = ""             # or use env var
# model = ""               # blank = use provider default
max_per_session = 5        # max escalations per session
confirm = true             # ask before escalating (costs money)
